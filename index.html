<!DOCTYPE html>
<html>
<head>
<title>Suprise Scoop</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #ffe6f0;
  text-align: center;
}

section {
  padding: 60px 20px;
}

h1 {
  color: #ff4da6;
  font-size: 40px;
}

button {
  padding: 10px 20px;
  background: #ff66b2;
  border: none;
  color: white;
  font-size: 18px;
  border-radius: 20px;
  cursor: pointer;
}

button:hover {
  background: #ff3385;
}

input, textarea {
  padding: 8px;
  margin: 10px;
  width: 250px;
  border-radius: 10px;
  border: 1px solid pink;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 20px;
  display: inline-block;
  box-shadow: 0px 0px 15px pink;
}
</style>
</head>

<body>

<!-- Welcome Page -->
<section>
  <h1>Welcome Cuties 💕</h1>
  <p>Welcome to Suprise Scoop 🎀</p>
</section>

<!-- Scoop Selection -->
<section>
  <div class="box">
    <h2>₹1999 Per Scoop</h2>
    <button onclick="minus()">-</button>
    <span id="count">1</span>
    <button onclick="plus()">+</button>
  </div>
</section>

<!-- Customer Details -->
<section>
  <div class="box">
    <h2>Order Details</h2>
    <input type="text" id="name" placeholder="Customer Name"><br>
    <input type="text" id="address" placeholder="Customer Address"><br>
    <textarea id="note" placeholder="Note"></textarea><br>

    <p>Scoops Total: ₹<span id="scoopTotal">1999</span></p>
    <p>Delivery Charges: ₹50</p>
    <h3>Grand Total: ₹<span id="grandTotal">2049</span></h3>

    <button onclick="buy()">Buy</button>
  </div>
</section>

<script>
let scoop = 1;
let price = 1999;
let delivery = 50;

function updateTotal() {
  document.getElementById("count").innerText = scoop;
  let scoopTotal = scoop * price;
  document.getElementById("scoopTotal").innerText = scoopTotal;
  document.getElementById("grandTotal").innerText = scoopTotal + delivery;
}

function plus() {
  scoop++;
  updateTotal();
}

function minus() {
  if (scoop > 1) {
    scoop--;
    updateTotal();
  }
}

function buy() {
  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;
  let note = document.getElementById("note").value;
  let total = document.getElementById("grandTotal").innerText;

  // PhonePe UPI link
  let upiLink = "upi://pay?pa=7013100850@upi&pn=SupriseScoop&am=" + total + "&cu=INR";

  // WhatsApp message
  let message = "Hello! I have placed an order.%0AName: " + name +
                "%0AAddress: " + address +
                "%0ANote: " + note +
                "%0ATotal: ₹" + total;

  let whatsappLink = "https://wa.me/7013100850?text=" + message;

  // Open PhonePe first
  window.location.href = upiLink;

  // Then open WhatsApp after 2 seconds
  setTimeout(function(){
    window.open(whatsappLink, "_blank");
  },2000);
}
</script>

</body>
</html>
