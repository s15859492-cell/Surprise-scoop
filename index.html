<script>
let price = 599;
let quantity = 1;

function updateTotal(){
    let delivery = parseInt(document.getElementById("delivery").value) || 0;
    let scoopMoney = price * quantity;
    let grand = scoopMoney + delivery;
    document.getElementById("scoopTotal").innerHTML =
        "Scoop Total: ₹" + scoopMoney;
    document.getElementById("grandTotal").innerHTML =
        "Grand Total: ₹" + grand;
}

function plus(){
    quantity++;
    document.getElementById("qty").innerHTML = quantity;
    updateTotal();
}

function minus(){
    if(quantity>1){
        quantity--;
        document.getElementById("qty").innerHTML = quantity;
        updateTotal();
    }
}

document.getElementById("delivery").addEventListener("input",updateTotal);

function buy(){
    let name = document.querySelector('input[placeholder="Customer Name"]').value || "Not provided";
    let address = document.querySelector('input[placeholder="Customer Address"]').value || "Not provided";
    let delivery = parseInt(document.getElementById("delivery").value) || 0;
    let scoopMoney = price * quantity;
    let grand = scoopMoney + delivery;

    let message = `Hi! I want to order Suprise Scoop.%0AName: ${name}%0AAddress: ${address}%0AQuantity: ${quantity}%0AScoop Total: ₹${scoopMoney}%0ADelivery: ₹${delivery}%0AGrand Total: ₹${grand}`;

    let waLink = "https://wa.me/917013100850?text=" + message;
    window.open(waLink, "_blank");
}
</script>
